name: Apply archive content detection

on:
  push:
    branches:
      - agent/archive-content-detection

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install archive tools
        run: sudo apt-get update && sudo apt-get install -y pigz zstd pbzip2 p7zip-full xz-utils

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: arx-go/go.sum

      - name: Apply focused source changes
        run: python3 scripts/apply_archive_detection.py

      - name: Format and validate source
        run: |
          gofmt -w arx-go/archive.go arx-go/archive_detection.go arx-go/archive_detection_test.go arx-go/archive_selection.go arx-go/archive_edit.go arx-go/panel.go
          git diff --check

      - name: Run bash smoke test
        run: bash tests/test_arx.sh

      - name: Run Go tests
        run: cd arx-go && go test -race ./...

      - name: Build distribution binary
        run: cd arx-go && go build -trimpath -ldflags='-s -w' -o ../dist/arx-go .

      - name: Verify distribution binary
        run: |
          test -x dist/arx-go
          file dist/arx-go

      - name: Upload distribution binary
        uses: actions/upload-artifact@v4
        with:
          name: arx-go-content-detection-linux-amd64
          path: dist/arx-go
          if-no-files-found: error

      - name: Commit implementation
        run: |
          rm scripts/apply_archive_detection.py .github/workflows/apply-archive-detection.yml
          rmdir scripts 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Detect existing archives by content'
          git push origin 'HEAD:agent/archive-content-detection'
