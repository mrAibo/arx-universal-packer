name: Integrate undo trash

on:
  push:
    branches: [agent/undo-trash]

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: arx-go/go.sum
      - name: Apply integration hooks
        run: python3 scripts/integrate_undo_trash.py
      - name: Format and test
        run: |
          gofmt -w arx-go
          bash tests/test_arx.sh
          cd arx-go
          go test -race ./...
          go build -trimpath -ldflags="-s -w" -o ../dist/arx-go .
      - name: Remove integration helpers
        run: rm -f scripts/integrate_undo_trash.py .github/workflows/undo-trash-integrate.yml
      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add undo for last trash operation"
          git push origin HEAD:agent/undo-trash
