name: Verify move conflict implementation

on:
  push:
    branches: [agent/move-conflict-dialog]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install archive tools
        run: sudo apt-get update && sudo apt-get install -y pigz zstd pbzip2 p7zip-full xz-utils
      - name: Run Bash smoke tests
        run: bash tests/test_arx.sh
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: arx-go/go.sum
      - name: Run Go race tests
        run: cd arx-go && go test -race -v ./...
      - name: Build distribution binary
        run: cd arx-go && go build -trimpath -ldflags="-s -w" -o ../dist/arx-go .
      - name: Verify distribution binary
        run: test -x dist/arx-go && file dist/arx-go && (dist/arx-go --version || true)
