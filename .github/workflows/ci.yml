name: CI

on: [push, pull_request]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/filesystem-trash-delete
          fetch-depth: 0

      - name: Update legacy F8 tests
        run: |
          python .github/update-trash-tests.py
          gofmt -w arx-go/navigation_test.go arx-go/tui_test.go
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm .github/update-trash-tests.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update tests for trash-based F8"
          git push origin HEAD:agent/filesystem-trash-delete
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install archive tools
        run: sudo apt-get update && sudo apt-get install -y pigz zstd pbzip2 p7zip-full xz-utils

      - name: Run arx (bash) smoke test
        run: bash tests/test_arx.sh

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: arx-go/go.sum

      - name: Test arx-go
        run: cd arx-go && go test -race ./...

      - name: Build arx-go distribution binary
        run: cd arx-go && go build -trimpath -ldflags="-s -w" -o ../dist/arx-go .

      - name: Verify distribution binary
        run: |
          test -x dist/arx-go
          file dist/arx-go
          dist/arx-go --version || true

      - name: Upload arx-go binary
        uses: actions/upload-artifact@v4
        with:
          name: arx-go-linux-amd64
          path: dist/arx-go
          if-no-files-found: error
