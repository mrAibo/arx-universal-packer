name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install archive tools
        run: sudo apt-get update && sudo apt-get install -y pigz zstd pbzip2 p7zip-full xz-utils
      - name: Run arx (bash) smoke test
        run: bash tests/test_arx.sh
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build arx-go
        run: cd arx-go && go build ./...
      - name: Test arx-go
        run: cd arx-go && go test -race ./...
