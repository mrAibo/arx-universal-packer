name: CI

on: [push, pull_request]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply one-shot full extraction fix
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/review-hardening'
        run: |
          python3 tools/apply_full_extract_fix.py
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          git rm tools/apply_full_extract_fix.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add arx-go/archive_selection.go arx-go/archive_edit.go arx-go/main.go .github/workflows/ci.yml
          git commit -m "Use safe full archive extraction path"
          git push origin HEAD:agent/review-hardening

      - name: Install archive tools
        run: sudo apt-get update && sudo apt-get install -y pigz zstd pbzip2 p7zip-full xz-utils

      - name: Run arx (bash) smoke test
        run: bash tests/test_arx.sh

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: arx-go/go.sum

      - name: Test arx-go
        run: cd arx-go && go test -race ./...

      - name: Build arx-go distribution binary
        run: cd arx-go && go build -trimpath -ldflags="-s -w" -o ../dist/arx-go .

      - name: Verify distribution binary
        run: |
          test -x dist/arx-go
          file dist/arx-go
          dist/arx-go --version || true

      - name: Upload arx-go binary
        uses: actions/upload-artifact@v4
        with:
          name: arx-go-linux-amd64
          path: dist/arx-go
          if-no-files-found: error

      - name: Commit rebuilt distribution binary
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
        run: |
          if git diff --quiet -- dist/arx-go; then
            echo "dist/arx-go is already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/arx-go
          git commit -m "Rebuild arx-go distribution binary"
          git push origin "HEAD:${GITHUB_REF_NAME}"
