name: CI

on: [push, pull_request]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install archive tools
        run: sudo apt-get update && sudo apt-get install -y pigz zstd pbzip2 p7zip-full xz-utils

      - name: Run arx (bash) smoke test
        run: bash tests/test_arx.sh

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: arx-go/go.sum

      - name: Test arx-go
        run: |
          set -o pipefail
          cd arx-go
          go test -race -v ./... 2>&1 | tee ../trash-test.log

      - name: Upload trash test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: filesystem-trash-go-test
          path: trash-test.log
          if-no-files-found: error

      - name: Build arx-go distribution binary
        run: cd arx-go && go build -trimpath -ldflags="-s -w" -o ../dist/arx-go .

      - name: Verify distribution binary
        run: |
          test -x dist/arx-go
          file dist/arx-go
          dist/arx-go --version || true

      - name: Upload arx-go binary
        uses: actions/upload-artifact@v4
        with:
          name: arx-go-linux-amd64
          path: dist/arx-go
          if-no-files-found: error
