name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y pigz zstd pbzip2 p7zip-full
      - name: Run arx smoke test
        run: bash tests/test_arx.sh
