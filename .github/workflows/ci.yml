name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install archive tools
        run: sudo apt-get update && sudo apt-get install -y pigz zstd pbzip2 p7zip-full xz-utils

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: arx-go/go.sum

      - name: Diagnose arx-go
        run: |
          set -o pipefail
          cd arx-go
          go test -race -v ./... 2>&1 | tee ../go-test.log

      - name: Upload Go diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: filesystem-copy-go-test
          path: go-test.log
          if-no-files-found: error
