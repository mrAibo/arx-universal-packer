name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install archive tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq pigz zstd pbzip2 p7zip-full xz-utils >/dev/null

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: arx-go/go.sum

      - name: Diagnose arx-go
        run: cd arx-go && go test -race -v ./...
