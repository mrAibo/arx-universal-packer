name: Integrate move conflict dialog

on:
  push:
    branches: [agent/move-conflict-dialog]

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/move-conflict-dialog
          fetch-depth: 0
      - name: Apply integration
        run: |
          python .github/apply-move-conflict.py
          gofmt -w arx-go/filesystem_move.go arx-go/main.go arx-go/view.go arx-go/move_conflict.go arx-go/move_conflict_test.go
          rm .github/apply-move-conflict.py .github/workflows/apply-move-conflict.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add move conflict decisions"
          git push origin HEAD:agent/move-conflict-dialog
