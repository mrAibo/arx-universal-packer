name: Integrate color themes

on:
  push:
    branches:
      - agent/color-themes

permissions:
  contents: write

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/color-themes
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: arx-go/go.mod
      - name: Apply feature changes
        run: python .github/scripts/apply_color_themes.py
      - name: Format and test
        run: |
          gofmt -w arx-go/theme.go arx-go/theme_test.go arx-go/main.go arx-go/view.go arx-go/navigation.go
          cd arx-go
          go test -race ./...
          go build -o ../dist/arx-go .
      - name: Remove temporary integration files
        run: |
          rm -f .github/scripts/apply_color_themes.py
          rm -f .github/workflows/integrate-color-themes.yml
      - name: Commit integrated feature
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Add runtime color themes"
          git push origin HEAD:agent/color-themes
