name: Apply operation progress integration

on:
  push:
    branches: [agent/operation-progress-cancel]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/operation-progress-cancel
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Apply focused integration
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f'missing pattern in {path}: {old[:80]!r}')
              p.write_text(text.replace(old, new, 1))

          replace('arx-go/main.go', '''type operationMsg struct {
          	result Result
          }''', '''type operationMsg struct {
          	result Result
          	state  *operationState
          }''')

          replace('arx-go/main.go', '''	case operationMsg:
          		m.busy = false
          		if msg.result.Err != nil {
          			m.modal = modalMessage
          			m.modalTitle = "Operation failed"
          			m.modalMessage = msg.result.Err.Error()
          			m.status = msg.result.Err.Error()
          		} else {''', '''	case operationTickMsg:
          		if !m.busy {
          			return m, nil
          		}
          		if snapshot, ok := snapshotOperation(); ok {
          			m.status = formatOperationStatus(snapshot)
          		}
          		return m, operationTick()
          	case operationMsg:
          		finishOperation(msg.state)
          		m.busy = false
          		if isOperationCancelled(msg.result.Err) {
          			m.status = "Operation cancelled"
          			m.reloadPanes()
          		} else if msg.result.Err != nil {
          			m.modal = modalMessage
          			m.modalTitle = "Operation failed"
          			m.modalMessage = msg.result.Err.Error()
          			m.status = msg.result.Err.Error()
          		} else {''')

          replace('arx-go/main.go', '''	case tea.KeyMsg:
          		if msg.String() == "ctrl+c" || msg.String() == "f10" {
          			return m, tea.Quit
          		}
          		if m.modal != modalNone {
          			return m.updateModal(msg)
          		}
          		if m.busy {
          			return m, nil
          		}''', '''	case tea.KeyMsg:
          		if m.busy {
          			if msg.String() == "esc" || msg.String() == "ctrl+c" {
          				cancelCurrentOperation()
          				m.status = "Cancelling operation…"
          			}
          			return m, nil
          		}
          		if msg.String() == "ctrl+c" || msg.String() == "f10" {
          			return m, tea.Quit
          		}
          		if m.modal != modalNone {
          			return m.updateModal(msg)
          		}''')

          old = '''func (m model) startOperation(status string, fn func() Result) (tea.Model, tea.Cmd) {
          	m.busy = true
          	m.status = status
          	return m, func() tea.Msg {
          		return operationMsg{result: fn()}
          	}
          }

          '''
          replace('arx-go/main.go', old, '')

          replace('arx-go/copy_conflict.go', '''	return m.startOperation(fmt.Sprintf("Copying %d selected item(s)...", len(items)), func() Result {
          		return copyFilesystemPlans(items)
          	})''', '''	return m.startOperationProgress(fmt.Sprintf("Copying %d selected item(s)...", len(items)), len(items), func() Result {
          		return copyFilesystemPlans(items)
          	})''')
          replace('arx-go/copy_conflict.go', '''	for _, plan := range plans {
          		if plan.skip {''', '''	for _, plan := range plans {
          		if err := operationCancelled(); err != nil {
          			return Result{Err: err}
          		}
          		setOperationItem(filepath.Base(plan.source))
          		if plan.skip {''')
          replace('arx-go/copy_conflict.go', '''		if plan.skip {
          			skipped++
          			continue
          		}''', '''		if plan.skip {
          			skipped++
          			advanceOperation()
          			continue
          		}''')
          replace('arx-go/copy_conflict.go', '''		copied++
          	}''', '''		copied++
          		advanceOperation()
          	}''')

          replace('arx-go/move_conflict.go', '''	return m.startOperation(fmt.Sprintf("Moving %d selected item(s)...", len(items)), func() Result {
          		return moveFilesystemDecisionPlans(items, target)
          	})''', '''	return m.startOperationProgress(fmt.Sprintf("Moving %d selected item(s)...", len(items)), len(items), func() Result {
          		return moveFilesystemDecisionPlans(items, target)
          	})''')
          replace('arx-go/move_conflict.go', '''	for _, plan := range plans {
          		if plan.skip {''', '''	for _, plan := range plans {
          		if err := operationCancelled(); err != nil {
          			return Result{Err: err}
          		}
          		setOperationItem(filepath.Base(plan.source))
          		if plan.skip {''')
          replace('arx-go/move_conflict.go', '''		if plan.skip {
          			skipped++
          			continue
          		}''', '''		if plan.skip {
          			skipped++
          			advanceOperation()
          			continue
          		}''')
          replace('arx-go/move_conflict.go', '''		moved++
          	}''', '''		moved++
          		advanceOperation()
          	}''')

          replace('arx-go/filesystem_copy.go', '\t"io"\n', '')
          replace('arx-go/filesystem_copy.go', 'io.Copy(temporary, input)', 'copyWithOperationProgress(temporary, input)')

          p = Path('arx-go/archive.go')
          text = p.read_text()
          text = text.replace('cmd := exec.Command(name, args...)', 'ctx := operationContext()\n\tcmd := exec.CommandContext(ctx, name, args...)', 2)
          text = text.replace('return cmd.Run()', 'err := cmd.Run()\n\tif ctx.Err() != nil {\n\t\treturn ctx.Err()\n\t}\n\treturn err', 2)
          text = text.replace('out, err := exec.Command(name, args...).CombinedOutput()\n\treturn string(out), err', 'ctx := operationContext()\n\tout, err := exec.CommandContext(ctx, name, args...).CombinedOutput()\n\tif ctx.Err() != nil {\n\t\treturn string(out), ctx.Err()\n\t}\n\treturn string(out), err')
          p.write_text(text)

          p = Path('arx-go/operation_progress.go')
          text = p.read_text().replace('func operationCancelled() error {', 'func isOperationCancelled(err error) bool {\n\treturn errors.Is(err, context.Canceled)\n}\n\nfunc operationCancelled() error {')
          text = text.replace('elapsed := time.Since(snapshot.started).Round(time.Second)', 'elapsed := time.Since(snapshot.started).Round(time.Second)\n\tif elapsed < 0 {\n\t\telapsed = 0\n\t}')
          p.write_text(text)
          PY
          gofmt -w arx-go/*.go
          rm .github/workflows/apply-operation-progress.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Add cancellable operation progress"
          git push origin HEAD:agent/operation-progress-cancel
